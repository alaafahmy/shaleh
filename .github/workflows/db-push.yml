name: Force Prisma DB Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  push-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Prisma DB Push
        env:
          DATABASE_URL: "postgresql://neondb_owner:npg_0tpwrTs4XeWN@ep-restless-bird-aph57d64.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require&connect_timeout=30"
          DIRECT_URL: "postgresql://neondb_owner:npg_0tpwrTs4XeWN@ep-restless-bird-aph57d64.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require&connect_timeout=30"
        run: npx prisma db push --accept-data-loss
